spring:
  application:
    name: smart-fin-assistant

  # Load local secrets/config from the repository-root .env when present.
  # Real environment variables still take precedence.
  config:
    import: optional:file:.env[.properties]

  # Default profile: local (Vertex AI through ADC + local pgvector).
  profiles:
    default: local

  datasource:
    url: jdbc:postgresql://localhost:5432/mydatabase
    username: myuser
    password: secret

  jpa:
    hibernate:
      ddl-auto: validate   # schema is owned by Flyway, not Hibernate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    placeholders:
      # Password for the read-only role created in V4. Overridable via env
      # (READONLY_DB_PASSWORD) for the cloud path; harmless default for local.
      readonly_password: ${READONLY_DB_PASSWORD:readonly_secret}

  ai:
    # Chat = Google GenAI (Gemini). Embedding = Vertex AI: the google-genai starter ships
    # no embedding model in Spring AI 2.0.0, so RAG embeddings run through Vertex.
    model:
      chat: google-genai
      embedding: vertexai
    google:
      genai:
        chat:
          options:
            # Gemini 3.5 Flash is GA. Keep this overridable for benchmark comparisons.
            model: ${CHAT_MODEL:gemini-3.5-flash}
    vertex:
      ai:
        embedding:
          # Requires GCP project + ADC (gcloud auth application-default login) in every
          # profile, including local.
          project-id: ${GCP_PROJECT_ID}
          location: ${GCP_LOCATION:us-central1}
          text:
            # Latest GA embedding model — multilingual (domain is Vietnamese),
            # supports Matryoshka output dimensions (768/1536/3072).
            model: gemini-embedding-001
            # Must equal the pgvector store dimensions below.
            output-dimensionality: 768
    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: hnsw
        distance-type: cosine_distance
        # Matches the Vertex embedding output-dimensionality above.
        dimensions: 768

server:
  port: 8080

logging:
  level:
    org.springframework.ai: INFO

app:
  rag:
    top-k: 1
    similarity-threshold: 0.80
  datasource:
    readonly:
      url: ${READONLY_DB_URL:${spring.datasource.url}}
      username: ${READONLY_DB_USER:finassist_readonly}
      password: ${READONLY_DB_PASSWORD:readonly_secret}
      driver-class-name: org.postgresql.Driver
  sql:
    maximum-rows: 100
    statement-timeout: 4s
    maximum-correction-attempts: 2
